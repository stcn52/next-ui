name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Configure pnpm build approvals
        run: pnpm config set --location project --json onlyBuiltDependencies '["esbuild","msw"]'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm build-storybook

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static
        if: github.ref == 'refs/heads/main'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check GitHub Pages status
        id: pages
        uses: actions/github-script@v9
        with:
          script: |
            try {
              await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              })
              core.info("GitHub Pages is enabled.")
              core.setOutput("enabled", "true")
            } catch (error) {
              if (error.status === 404) {
                core.warning("GitHub Pages is not enabled. Skipping deploy step.")
                core.setOutput("enabled", "false")
              } else {
                throw error
              }
            }

      - name: Skip deploy when Pages disabled
        if: steps.pages.outputs.enabled != 'true'
        run: echo "GitHub Pages is disabled. Enable it in repository settings to publish Storybook."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        if: steps.pages.outputs.enabled == 'true'
